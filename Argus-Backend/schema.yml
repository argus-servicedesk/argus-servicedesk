components:
  schemas:
    APMMetric:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        value:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - name
      - timestamp
      - value
    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        action:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        old_value:
          type: string
          nullable: true
        new_value:
          type: string
          nullable: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - id
