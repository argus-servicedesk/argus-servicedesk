  /api/v1/assets/{id}/management-endpoints/:
    get:
      operationId: api_v1_assets_management_endpoints_list
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: protocol
        schema:
          type: string
          enum:
          - API
          - IDRAC
          - ILO
          - NGINX_EXPORTER
          - NODE_EXPORTER
          - REDFISH
          - SNMP
          - SSH
          - WINDOWS_EXPORTER
          - WINRM
        description: |-
          * `IDRAC` - iDRAC
          * `ILO` - iLO
          * `SNMP` - SNMP
          * `NODE_EXPORTER` - Node Exporter
          * `WINDOWS_EXPORTER` - Windows Exporter
          * `NGINX_EXPORTER` - Nginx Exporter
          * `REDFISH` - Redfish
          * `SSH` - SSH
          * `WINRM` - WinRM
          * `API` - API
      tags:
      - api
      security:
      - jwtAuth: []
