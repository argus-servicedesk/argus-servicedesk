  /api/v1/problems/:
    get:
      operationId: api_v1_problems_list
      description: |-
        GET  /problems/   — paginated list with search + filter
        POST /problems/   — create new problem
      parameters:
      - in: query
        name: assigned_to
        schema:
          type: string
          format: uuid
      - in: query
        name: category
        schema:
          type: string
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - P1
          - P2
          - P3
          - P4
        description: |-
          * `P1` - P1 - Critical
          * `P2` - P2 - High
          * `P3` - P3 - Medium
          * `P4` - P4 - Low
      - in: query
        name: state
        schema:
          type: string
          enum:
          - CLOSED
          - INVESTIGATION
          - KNOWN_ERROR
          - NEW
          - RCA_IN_PROGRESS
          - RESOLVED
        description: |-
          * `NEW` - New
          * `INVESTIGATION` - Investigation
          * `RCA_IN_PROGRESS` - RCA In Progress
          * `KNOWN_ERROR` - Known Error
          * `RESOLVED` - Resolved
          * `CLOSED` - Closed
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProblemList'
          description: ''
    post:
      operationId: api_v1_problems_create
      description: |-
        GET  /problems/   — paginated list with search + filter
        POST /problems/   — create new problem
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProblemCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProblemCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProblemCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemCreate'
          description: ''
