  /api/v1/assets/:
    get:
      operationId: api_v1_assets_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: environment
        schema:
          type: string
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: site
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        schema:
          type: string
          enum:
          - DECOMMISSIONED
          - DISPOSED
          - IN_STOCK
          - LIVE
          - MAINTENANCE
          - PLANNED
          - RESERVED
        description: |-
          * `LIVE` - Live
          * `MAINTENANCE` - Maintenance
          * `DECOMMISSIONED` - Decommissioned
          * `PLANNED` - Planned
          * `IN_STOCK` - In Stock
          * `RESERVED` - Reserved
          * `DISPOSED` - Disposed
      - in: query
        name: type
        schema:
          type: string
          enum:
          - APPLICATION
          - CABLE
          - CONTAINER
          - DATABASE
          - ENCLOSURE
          - END_USER_DEVICE
          - FIREWALL
          - KUBERNETES_CLUSTER
          - LOAD_BALANCER
          - MONITOR
          - NETWORK
          - NETWORK_DEVICE
          - PDU
          - PERIPHERAL
          - PHONE
          - PRINTER
          - RACK_UNIT
          - ROUTER
          - SERVER
          - SIMCARD
          - SOFTWARE
          - STORAGE
          - SWITCH
          - UPS
          - VM
        description: |-
          * `SERVER` - Server
          * `KUBERNETES_CLUSTER` - Kubernetes Cluster
          * `DATABASE` - Database
          * `APPLICATION` - Application
          * `NETWORK` - Network
          * `NETWORK_DEVICE` - Network Device
          * `SWITCH` - Switch
          * `ROUTER` - Router
          * `FIREWALL` - Firewall
          * `STORAGE` - Storage
          * `CONTAINER` - Container
          * `VM` - Virtual Machine
          * `LOAD_BALANCER` - Load Balancer
          * `SOFTWARE` - Software
          * `END_USER_DEVICE` - End User Device
          * `MONITOR` - Monitor
          * `PERIPHERAL` - Peripheral
          * `SIMCARD` - SIM Card
          * `PHONE` - Phone
          * `PRINTER` - Printer
          * `RACK_UNIT` - Rack Unit
          * `PDU` - Power Distribution Unit
          * `ENCLOSURE` - Enclosure
          * `CABLE` - Cable
          * `UPS` - UPS
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConfigurationItemList'
          description: ''
    post:
      operationId: api_v1_assets_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigurationItemCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConfigurationItemCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConfigurationItemCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
