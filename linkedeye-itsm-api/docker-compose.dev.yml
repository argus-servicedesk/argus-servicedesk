version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedeye-postgres
    environment:
      POSTGRES_USER: linkedeye
      POSTGRES_PASSWORD: linkedeye
      POSTGRES_DB: linkedeye
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linkedeye-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
