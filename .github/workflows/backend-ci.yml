name: Backend CI

on:
  push:
    paths:
      - "Argus-Backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "Argus-Backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: Argus-Backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: argus_servicedesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-django-secret-key-at-least-32-bytes-long
      JWT_SIGNING_KEY: ci-jwt-signing-key-at-least-32-bytes-long-xx
      DJANGO_DEBUG: "true"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: argus_servicedesk
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check

      - name: Tests
        run: python manage.py test apps.incidents.tests_workflow apps.incidents.tests_rbac -v 2
